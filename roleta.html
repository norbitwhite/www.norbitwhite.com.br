<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="monetag" content="6b6f54826ba181e45cba77ab49403b71">
<title>Roleta de Tickets - Norbit White</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

/* TOPO */
.topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:60px;
  display:flex;
  align-items:center;
  padding:0 18px;
  background:#000;
  border-bottom:1px solid rgba(161,0,255,.25);
  z-index:9999;
}
.hamburger{font-size:26px; cursor:pointer;}
.brand{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:900;
}

/* MENU */
.overlay{
  position:fixed;
  inset:60px 0 0 0;
  background:rgba(0,0,0,.6);
  opacity:0;
  visibility:hidden;
  transition:.2s;
  z-index:9997;
}
.overlay.active{
  opacity:1;
  visibility:visible;
}

.menu{
  position:fixed;
  top:60px;
  left:0;
  width:82vw;
  max-width:320px;
  height:calc(100vh - 60px);
  background:#120022;
  padding:15px;
  transform:translateX(-110%);
  transition:.25s;
  z-index:9998;
}
.menu.active{
  transform:translateX(0);
}
.menu a{
  display:block;
  padding:16px;
  margin:12px 0;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  color:#fff;
  text-decoration:none;
  font-weight:900;
}

/* CONTEÚDO */
.wrap{
  padding-top:100px;
  text-align:center;
}

h1{
  font-size:26px;
  font-weight:900;
  margin-bottom:6px;
}

.sub{
  color:rgba(255,255,255,.7);
  margin-bottom:20px;
}

.wheel-area{
  position:relative;
  width:240px;
  height:240px;
  margin:0 auto 20px;
  border-radius:50%;
  padding:10px;
  background:
    linear-gradient(#000,#000) padding-box,
    linear-gradient(135deg,#6f00ff,#ff00ff) border-box;
  border:4px solid transparent;
  box-shadow:0 0 20px rgba(161,0,255,.35);
}

.pointer{
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:18px solid #fff;
}

canvas{
  width:100%;
  height:100%;
  border-radius:50%;
}

.btn{
  padding:12px 26px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,#6f00ff,#a100ff);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

.stat{
  margin-top:15px;
  font-size:18px;
  font-weight:900;
}

.progress{
  width:90%;
  max-width:420px;
  height:8px;
  background:#222;
  margin:12px auto;
  border-radius:999px;
  overflow:hidden;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6f00ff,#ff00ff);
  transition:.3s;
}

footer{
  margin-top:40px;
  padding:20px;
  border-top:1px solid rgba(161,0,255,.25);
  font-size:13px;
  color:rgba(255,255,255,.6);
  text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="hamburger" id="hamburger">☰</div>
  <div class="brand">
  <img src="logo400.jpg" style="height:58px;">
</div>
</div>

<div class="overlay" id="overlay"></div>

<div class="menu" id="menu">
  <a href="index.html">Início</a>
  <a href="campeonato.html">Campeonato</a>
  <a href="roleta.html">Roleta</a>
  <a href="termos.html">Termos</a>
  <a href="politica.html">Privacidade</a>
</div>

<div class="wrap">
  <h1>ROLETA DE TICKETS</h1>
  <p class="sub">Gire e acumule tickets até bater a meta.</p>

  <div class="wheel-area">
    <div class="pointer"></div>
    <canvas id="wheel" width="600" height="600"></canvas>
  </div>

  <button class="btn" id="spinBtn">GIRAR</button>

  <div class="stat" id="ticketsText">Tickets acumulados: 0</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p style="font-size:13px;">
    Junte <b>50 tickets</b> e desbloqueie:<br>
    <b>UMA LOGO + UM BANNER + UMA THUMBNAIL</b>
  </p>
</div>

<footer>© 2026 Norbit White Design</footer>

<script>
/* MENU */
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
document.getElementById("hamburger").onclick = ()=>{
  menu.classList.toggle("active");
  overlay.classList.toggle("active");
};
overlay.onclick = ()=>{
  menu.classList.remove("active");
  overlay.classList.remove("active");
};

/* SALVAMENTO */
const STORAGE_KEY="nw_roleta";
let saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
let tickets=saved.tickets||0;
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({tickets}))}

/* ROLETA */
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const prizes=[
  {label:"2 TICKETS",value:2,color:"#6f00ff"},
  {label:"3 TICKETS",value:3,color:"#ff00ff"},
  {label:"5 TICKETS",value:5,color:"#6f00ff"},
  {label:"7 TICKETS",value:7,color:"#ff00ff"},
  {label:"2 TICKETS",value:2,color:"#6f00ff"},
  {label:"3 TICKETS",value:3,color:"#ff00ff"},
  {label:"5 TICKETS",value:5,color:"#6f00ff"},
  {label:"7 TICKETS",value:7,color:"#ff00ff"},
];

let angle=0;
let spinning=false;
let adLoaded=false;

function draw(){
  const W=canvas.width;
  const H=canvas.height;
  const cx=W/2;
  const cy=H/2;
  const r=W*0.42;
  const slice=(Math.PI*2)/prizes.length;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);
  for(let i=0;i<prizes.length;i++){
    const start=i*slice;
    const end=start+slice;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,end,start,true);
    ctx.closePath();
    ctx.fillStyle=prizes[i].color;
    ctx.fill();
    ctx.save();
    ctx.rotate(start+slice/2);
    ctx.fillStyle="#fff";
    ctx.font="bold 20px Arial";
    ctx.textAlign="center";
    ctx.fillText(prizes[i].label,r*0.65,0);
    ctx.restore();
  }
  ctx.restore();
}

function updateUI(){
  document.getElementById("ticketsText").innerText="Tickets acumulados: "+tickets;
  document.getElementById("bar").style.width=Math.min((tickets/50)*100,100)+"%";
  save();
}

function spin(){
  if(spinning) return;
  spinning=true;

  const idx=Math.floor(Math.random()*prizes.length);
  const slice=(Math.PI*2)/prizes.length;
  const target=(Math.PI*2*6)-(idx*slice+slice/2);
  const start=angle;
  const duration=4000;
  const startTime=performance.now();

  function animate(now){
    let t=(now-startTime)/duration;
    if(t>1)t=1;
    angle=start+(target-start)*(1-Math.pow(1-t,3));
    draw();
    if(t<1){
      requestAnimationFrame(animate);
    }else{
      tickets+=prizes[idx].value;
      updateUI();
      spinning=false;
    }
  }
  requestAnimationFrame(animate);
}

function showAd(){
  if(!adLoaded){
    const s=document.createElement("script");
    s.dataset.zone="10671343";
    s.src="https://al5sm.com/tag.min.js";
    document.body.appendChild(s);
    adLoaded=true;
  }
}

/* BOTÃO */
document.getElementById("spinBtn").onclick=()=>{
  showAd();
  spin();
};

draw();
updateUI();
</script>

</body>
</html>
