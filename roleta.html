<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="monetag" content="6b6f54826ba181e45cba77ab49403b71">

<title>Roleta de Tickets - Norbit White</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
  max-width:100%;
}

.topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:60px;
  display:flex;
  align-items:center;
  padding:0 18px;
  background:rgba(0,0,0,.95);
  border-bottom:1px solid rgba(161,0,255,.25);
  z-index:9999;
}
.hamburger{font-size:26px; cursor:pointer; user-select:none;}
.brand{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:900;
}

/* ✅ OVERLAY */
.overlay{
  position:fixed;
  inset:60px 0 0 0;
  background:rgba(0,0,0,.55);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:.2s ease;
  z-index:9997;
}
.overlay.active{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

/* ✅ MENU (sem faixa na esquerda) */
.menu{
  position:fixed;
  top:60px;
  left:0;
  width:min(320px,82vw);
  height:calc(100vh - 60px);

  background:rgba(12, 0, 22, .92);
  backdrop-filter: blur(10px);

  padding:14px 14px 18px;
  z-index:9998;
  overflow:auto;

  transform: translateX(-110%);
  opacity: 0;
  visibility: hidden;
  pointer-events: none;

  border:none;
  box-shadow:none;

  transition: transform .25s ease, opacity .2s ease, visibility .2s ease;
}
.menu.active{
  transform: translateX(0);
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.menu a{
  display:block;
  text-decoration:none;
  color:#fff;
  font-weight:900;
  font-size:18px;
  padding:18px 18px;
  margin:14px 10px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(161,0,255,.18);
}

.wrap{
  padding-top:100px;
  text-align:center;
}

h1{
  font-size:26px;
  font-weight:900;
  letter-spacing:1px;
  margin-bottom:6px;
}

.sub{
  color:rgba(255,255,255,.7);
  margin-bottom:20px;
}

.wheel-area{
  position:relative;
  width:min(240px,85vw);
  height:min(240px,85vw);
  margin:0 auto 20px;
  border-radius:50%;
  padding:10px;

  background:
    linear-gradient(#000,#000) padding-box,
    linear-gradient(135deg,#6f00ff,#ff00ff) border-box;

  border:4px solid transparent;
  box-shadow:
    0 0 20px rgba(161,0,255,.35),
    inset 0 0 12px rgba(255,255,255,.06);
}

.pointer{
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:18px solid #fff;
  z-index:10;
}

canvas{
  width:100%;
  height:100%;
  border-radius:50%;
}

.btn{
  padding:12px 26px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,#6f00ff,#a100ff);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  margin:10px;
}
.btn:disabled{opacity:.6; cursor:not-allowed;}

.stat{
  margin-top:15px;
  font-size:18px;
  font-weight:900;
}

.progress{
  width:90%;
  max-width:420px;
  height:8px;
  background:#222;
  margin:12px auto;
  border-radius:999px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6f00ff,#ff00ff);
  transition:.3s;
}

footer{
  margin-top:40px;
  padding:20px;
  border-top:1px solid rgba(161,0,255,.25);
  font-size:13px;
  color:rgba(255,255,255,.6);
  text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="hamburger" id="hamburger">☰</div>
  <div class="brand">Norbit White</div>
</div>

<div class="overlay" id="overlay"></div>

<div class="menu" id="menu">
  <a href="index.html">Início</a>
  <a href="campeonato.html">Campeonato</a>
  <a href="roleta.html">Roleta</a>
  <a href="forma2.html">Feedback</a>
  <a href="termos.html">Termos</a>
  <a href="politica.html">Privacidade</a>
</div>

<div class="wrap">
  <h1>ROLETA DE TICKETS</h1>
  <p class="sub">Gire e acumule tickets até bater a meta.</p>

  <div class="wheel-area">
    <div class="pointer"></div>
    <canvas id="wheel" width="600" height="600"></canvas>
  </div>

  <button class="btn" id="spinBtn" onclick="spinFlow()">GIRAR</button>

  <div class="stat" id="ticketsText">Tickets acumulados: 0</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p style="font-size:13px;">
    Junte <b>50 tickets</b> e desbloqueie:<br>
    <b>UMA LOGO + UM BANNER + UMA THUMBNAIL</b>
  </p>
</div>

<footer>
© NORBIT WHITE
</footer>

<script>
/* =========================
   ✅ MENU
   ========================= */
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const hamburger = document.getElementById("hamburger");

function toggleMenu(){
  menu.classList.toggle("active");
  overlay.classList.toggle("active");
}
hamburger.addEventListener("click", toggleMenu);
overlay.addEventListener("click", toggleMenu);

/* =========================
   ✅ SALVAMENTO AUTOMÁTICO (LOCALSTORAGE)
   ========================= */
const STORAGE_KEY = "nw_roleta_state_v1";

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { tickets:0, spins:0 };
    const data = JSON.parse(raw);
    return {
      tickets: Number(data.tickets) || 0,
      spins: Number(data.spins) || 0
    };
  }catch(e){
    return { tickets:0, spins:0 };
  }
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tickets, spins }));
  }catch(e){}
}

/* =========================
   🎯 ROLETA (NÃO MEXI NA LÓGICA)
   ========================= */
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = [
  {label:"2 TICKETS", value:2, color:"#6f00ff"},
  {label:"3 TICKETS", value:3, color:"#ff00ff"},
  {label:"5 TICKETS", value:5, color:"#6f00ff"},
  {label:"7 TICKETS", value:7, color:"#ff00ff"},
  {label:"2 TICKETS", value:2, color:"#6f00ff"},
  {label:"3 TICKETS", value:3, color:"#ff00ff"},
  {label:"5 TICKETS", value:5, color:"#6f00ff"},
  {label:"7 TICKETS", value:7, color:"#ff00ff"},
];

let angle = 0;

// ✅ carrega o que a pessoa já tinha
const saved = loadState();
let tickets = saved.tickets;
let spins = saved.spins;

let spinning = false;

const ticketsText = document.getElementById("ticketsText");
const bar = document.getElementById("bar");
const spinBtn = document.getElementById("spinBtn");

/* =========================
   🔊 SOM (WebAudio leve)
   ========================= */
let audioCtx = null;
let tickTimer = null;

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
}

function playTick(){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "square";
  o.frequency.value = 880;
  g.gain.value = 0.04;

  o.connect(g);
  g.connect(audioCtx.destination);

  const t = audioCtx.currentTime;
  g.gain.setValueAtTime(0.04, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

  o.start(t);
  o.stop(t + 0.03);
}

function playDing(){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "sine";
  o.frequency.value = 1200;
  g.gain.value = 0.06;

  o.connect(g);
  g.connect(audioCtx.destination);

  const t = audioCtx.currentTime;
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);

  o.start(t);
  o.stop(t + 0.22);
}

function startTicking(){
  stopTicking();
  tickTimer = setInterval(()=>playTick(), 70);
  setTimeout(()=>{ if(tickTimer){ clearInterval(tickTimer); tickTimer = setInterval(()=>playTick(), 95); } }, 1200);
  setTimeout(()=>{ if(tickTimer){ clearInterval(tickTimer); tickTimer = setInterval(()=>playTick(), 125); } }, 2600);
  setTimeout(()=>{ if(tickTimer){ clearInterval(tickTimer); tickTimer = setInterval(()=>playTick(), 160); } }, 3600);
}

function stopTicking(){
  if(tickTimer){
    clearInterval(tickTimer);
    tickTimer = null;
  }
}

/* =========================
   🎨 DESENHAR ROLETA
   ========================= */
function draw(){
  const W = canvas.width;
  const H = canvas.height;
  const cx = W/2;
  const cy = H/2;
  const r = W*0.42;
  const slice = (Math.PI*2)/prizes.length;

  ctx.clearRect(0,0,W,H);

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);

  for(let i=0;i<prizes.length;i++){
    const start = i*slice;
    const end = start+slice;

    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,end,start,true);
    ctx.closePath();
    ctx.fillStyle = prizes[i].color;
    ctx.fill();

    ctx.save();
    const mid = start + slice/2;
    ctx.rotate(mid);

    ctx.font = "900 24px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    ctx.lineWidth=5;
    ctx.strokeStyle="rgba(0,0,0,.6)";
    ctx.strokeText(prizes[i].label, r*0.65, 0);

    ctx.fillStyle="#fff";
    ctx.fillText(prizes[i].label, r*0.65, 0);

    ctx.restore();
  }

  ctx.restore();
}

function easeOut(t){ return 1-Math.pow(1-t,3); }

/* =========================
   ✅ ANÚNCIO (igual já estava)
   ========================= */
function spinFlow(){
  if(spinning) return;

  ensureAudio();

  (function(s){
    s.dataset.zone='10671343',
    s.src='https://al5sm.com/tag.min.js'
  })([document.documentElement, document.body]
  .filter(Boolean).pop()
  .appendChild(document.createElement('script')));

  spin();
}

function spin(){
  if(spinning) return;
  spinning = true;

  // ✅ conta giro e salva
  spins += 1;
  saveState();

  const idx = Math.floor(Math.random()*prizes.length);
  const slice = (Math.PI*2)/prizes.length;
  const targetMid = idx*slice + slice/2;
  const final = (Math.PI*2*6) - targetMid;

  const startAngle = angle;
  const duration = 4500;
  const start = performance.now();

  startTicking();

  function animate(now){
    const t = (now-start)/duration;
    const p = easeOut(Math.min(1,t));
    angle = startAngle + (final-startAngle)*p;
    draw();

    if(t<1){
      requestAnimationFrame(animate);
    }else{
      stopTicking();
      playDing();

      // ✅ contabiliza e salva
      tickets += prizes[idx].value;
      saveState();

      updateUI();

      spinning = false;
      spinBtn.disabled = false;
    }
  }

  requestAnimationFrame(animate);
}

function updateUI(){
  ticketsText.textContent="Tickets acumulados: "+tickets;
  const pct=Math.min((tickets/50)*100,100);
  bar.style.width=pct+"%";

  // ✅ garante salvamento sempre que atualizar a UI
  saveState();

  if(tickets>=50){
    setTimeout(()=>{
      alert("🎉 PRÊMIO DESBLOQUEADO!");
      tickets=0;
      saveState();
      updateUI();
    },100);
  }
}

/* ✅ inicia já mostrando o que estava salvo */
draw();
updateUI();
</script>

</body>
</html>
